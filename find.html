<!DOCTYPE html>
<html lang="en">
<head>
  <title>RoFind</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="author" content="Onion">
  <meta name="description" content="Find Roblox profiles and places with RoFind">

  <meta property="og:title" content="RoFind">
  <meta property="og:description" content="Find Roblox profiles and places with RoFind">
  <meta property="og:site_name" content="Rofund">

  <link rel="icon" type="image/png" href="https://yoylecookie.github.io/yoylecookie/logos-rbxfnd.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #0f172a, #111827);
      color: white;
      overflow: hidden;
    }

    .bg-glow {
      position: absolute;
      width: 500px;
      height: 500px;
      background: #00ff88;
      filter: blur(150px);
      opacity: 0.12;
      border-radius: 50%;
      top: -150px;
      right: -100px;
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 90%;
      max-width: 500px;
      padding: 35px;
      border-radius: 24px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 20px 60px rgba(0,0,0,0.45);
      text-align: center;
      z-index: 1;
    }

    .title {
      font-size: 42px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #7dffba;
      text-shadow: 0 0 15px rgba(0,255,136,0.25);
    }

    .subtitle {
      color: #b8c0d4;
      margin-bottom: 28px;
      font-size: 15px;
      line-height: 1.6;
    }

    input {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      transition: 0.2s ease;
      outline: none;
    }

    input::placeholder {
      color: #9aa4ba;
    }

    input:focus {
      border-color: #00ff88;
      background: rgba(255,255,255,0.12);
      box-shadow: 0 0 15px rgba(0,255,136,0.25);
    }

    button {
      margin-top: 18px;
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #00ff88, #00c96b);
      color: #08130d;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
      box-shadow: 0 10px 30px rgba(0,255,136,0.25);
    }

    button:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 35px rgba(0,255,136,0.35);
    }

    button:active {
      transform: scale(0.98);
    }

    #output {
      margin-top: 24px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      color: #7dffba;
      word-break: break-all;
      min-height: 25px;
      font-size: 14px;
    }

    #output a {
      color: #7dffba;
      text-decoration: none;
    }

    #output a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #94a3b8;
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="container">
    <div class="title">RoFind</div>

    <div class="subtitle">
      Enter a Roblox username to open their profile and find their place ID.
    </div>

    <input
      placeholder="Enter Roblox username"
      id="username"
      onkeydown="if(event.key==='Enter') findUser()"
    >

    <button onclick="findUser()">GET PROFILE LINK</button>

    <div id="output"></div>

    <div class="footer">
      Made by Onion
    </div>
  </div>

  <script>
    function findUser() {
      const username = document.getElementById("username").value.trim();

      if (!username) {
        document.getElementById("output").innerHTML =
          "Please enter a username.";
        return;
      }

      const profileUrl =
        "https://www.roblox.com/users/profile?username=" +
        encodeURIComponent(username);

      document.getElementById("output").innerHTML = `
        <a href="${profileUrl}" target="_blank">
          ${profileUrl}
        </a>
      `;
    }
  </script>
</body>
</html>
