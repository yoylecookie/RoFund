<!DOCTYPE html>
<html lang="en">
<head>
  <title>RoFund - How to Use</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="https://yoylecookie.github.io/yoylecookie/logos-rbxfnd.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: white;
      overflow: hidden;

      background: radial-gradient(circle at 20% 20%, #1b2a4a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #0ea5e9, transparent 45%),
                  radial-gradient(circle at 50% 80%, #22c55e, transparent 50%),
                  #05070d;
    }

    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 60%);
      filter: blur(100px);
      opacity: 0.7;
      pointer-events: none;
      animation: float 8s ease-in-out infinite;
    }

    .glow:nth-child(1) {
      top: -180px;
      right: -150px;
    }

    .glow:nth-child(2) {
      bottom: -180px;
      left: -150px;
      animation-delay: 2.5s;
      background: radial-gradient(circle, rgba(120,120,255,0.25), transparent 60%);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(25px) scale(1.05); }
    }

    .container {
      position: relative;
      width: 92%;
      max-width: 720px;

      padding: 26px;
      border-radius: 28px;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);

      border: 1px solid rgba(255,255,255,0.15);
      box-shadow:
        0 25px 70px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.2);

      text-align: center;

      transition: transform 0.15s ease;
      transform-style: preserve-3d;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
      color: rgba(255,255,255,0.9);
    }

    p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 18px;
    }

    /* VIDEO CARD */
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;

      border-radius: 20px;
      overflow: hidden;

      border: 1px solid rgba(255,255,255,0.15);

      box-shadow: 0 25px 70px rgba(0,0,0,0.7);

      transform-style: preserve-3d;
      transition: transform 0.2s ease;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* 🔥 GLASS REFLECTION LAYER */
    .video-wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        120deg,
        rgba(255,255,255,0.18),
        transparent 40%,
        rgba(255,255,255,0.08)
      );
      pointer-events: none;
      mix-blend-mode: screen;
    }

    /* subtle highlight sweep */
    .video-wrap::after {
      content: "";
      position: absolute;
      inset: -40%;
      background: radial-gradient(circle at var(--x, 50%) var(--y, 50%),
        rgba(255,255,255,0.18),
        transparent 45%);
      opacity: 0;
      transition: opacity 0.2s ease;
      pointer-events: none;
    }

    .video-wrap:hover::after {
      opacity: 1;
    }

    .back {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 14px;

      border-radius: 999px;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);

      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 12px;

      transition: 0.2s ease;
    }

    .back:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }
  </style>
</head>

<body>
  <div class="glow"></div>
  <div class="glow"></div>

  <div class="container" id="card">
    <h1>How to use RoFund</h1>
    <p>Watch the tutorial to learn how stand codes work</p>

    <div class="video-wrap" id="video">
      <iframe
        src="https://www.youtube.com/embed/i_NsjYn0mWo?rel=0&modestbranding=1&playsinline=1&fs=1&iv_load_policy=3"
        title="RoFund Tutorial"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <a class="back" href="index.html">← Back to RoFund</a>
  </div>

  <script>
    const card = document.getElementById("card");
    const video = document.getElementById("video");

    // 🎯 mouse tilt (Apple-style parallax)
    document.addEventListener("mousemove", (e) => {
      const x = (window.innerWidth / 2 - e.clientX) / 40;
      const y = (window.innerHeight / 2 - e.clientY) / 40;

      card.style.transform = `rotateY(${x}deg) rotateX(${y}deg)`;
    });

    // reset when mouse leaves
    document.addEventListener("mouseleave", () => {
      card.style.transform = "rotateY(0deg) rotateX(0deg)";
    });

    // glass reflection follow cursor (video only)
    video.addEventListener("mousemove", (e) => {
      const rect = video.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;

      video.style.setProperty("--x", x + "%");
      video.style.setProperty("--y", y + "%");
    });
  </script>
</body>
</html>
