<!DOCTYPE html>
<html lang="en">
<head>
  <title>RoFund - How to Use</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link rel="icon" type="image/png" href="https://yoylecookie.github.io/yoylecookie/logos-rbxfnd.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: white;
      overflow: hidden;

      background:
        radial-gradient(circle at 20% 20%, #1b2a4a, transparent 40%),
        radial-gradient(circle at 80% 30%, #0ea5e9, transparent 45%),
        radial-gradient(circle at 50% 80%, #22c55e, transparent 50%),
        #05070d;
    }

    /* soft background glow only */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,140,255,0.25), transparent 60%);
      filter: blur(90px);
      opacity: 0.6;
      pointer-events: none;
      animation: float 10s ease-in-out infinite;
    }

    .glow:nth-child(1) {
      top: -180px;
      right: -150px;
    }

    .glow:nth-child(2) {
      bottom: -180px;
      left: -150px;
      animation-delay: 3s;
      background: radial-gradient(circle, rgba(0,255,180,0.2), transparent 60%);
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(20px) scale(1.03); }
    }

    .container {
      position: relative;
      width: 92%;
      max-width: 720px;

      padding: 26px;
      border-radius: 28px;

      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);

      border: 1px solid rgba(255,255,255,0.15);

      box-shadow:
        0 25px 70px rgba(0,0,0,0.65),
        inset 0 1px 0 rgba(255,255,255,0.2);

      text-align: center;

      animation: pop 0.6s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.97); }
      to { opacity: 1; transform: scale(1); }
    }

    h1 {
      font-size: 18px;
      margin-bottom: 8px;
    }

    p {
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 18px;
    }

    /* stable video container */
    .video-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;

      border-radius: 20px;
      overflow: hidden;

      border: 1px solid rgba(255,255,255,0.15);

      box-shadow: 0 20px 60px rgba(0,0,0,0.6);

      transition: transform 0.2s ease;
    }

    .video-wrap:hover {
      transform: scale(1.01);
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .back {
      display: inline-block;
      margin-top: 16px;
      padding: 8px 14px;

      border-radius: 999px;

      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);

      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 12px;

      transition: 0.2s ease;
    }

    .back:hover {
      transform: translateY(-2px);
      background: rgba(255,255,255,0.14);
    }
  </style>
</head>

<body>
  <div class="glow"></div>
  <div class="glow"></div>

  <div class="container">
    <h1>How to use RoFund</h1>
    <p>Watch the tutorial below</p>

    <div class="video-wrap">
      <iframe
        src="https://www.youtube.com/embed/i_NsjYn0mWo?rel=0&modestbranding=1&playsinline=1&iv_load_policy=3"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen>
      </iframe>
    </div>

    <a class="back" href="index.html">← Back to RoFund</a>
  </div>
</body>
</html>
