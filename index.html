<!DOCTYPE html>
<html lang="en">
<head>
  <title>Rofund</title>

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <meta name="author" content="Onion">
  <meta name="description" content="Welcome to Rofund">

  <link rel="icon" type="image/png" href="https://yoylecookie.github.io/yoylecookie/logos-rbxfnd.png">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      color: white;
      overflow: hidden;

      /* soft liquid gradient background */
      background: radial-gradient(circle at 20% 20%, #1b2a4a, transparent 40%),
                  radial-gradient(circle at 80% 30%, #0ea5e9, transparent 45%),
                  radial-gradient(circle at 50% 80%, #22c55e, transparent 50%),
                  #05070d;
    }

    /* floating glow blobs */
    .bg-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(0,255,170,0.35), transparent 60%);
      filter: blur(80px);
      top: -200px;
      right: -150px;
      opacity: 0.6;
      pointer-events: none;
    }

    .container {
      position: relative;
      width: 92%;
      max-width: 420px;

      padding: 28px;
      border-radius: 28px;

      /* liquid glass effect */
      background: rgba(255,255,255,0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);

      border: 1px solid rgba(255,255,255,0.15);
      box-shadow:
        0 20px 60px rgba(0,0,0,0.55),
        inset 0 1px 0 rgba(255,255,255,0.2);

      text-align: center;
    }

    .logo {
      width: 260px;
      margin-bottom: 14px;
      filter: drop-shadow(0 10px 25px rgba(0,255,180,0.25));
    }

    .subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.7);
      margin-bottom: 18px;
    }

    .howto-link {
      display: inline-block;
      margin-top: 10px;
      padding: 8px 12px;

      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);

      color: rgba(255,255,255,0.85);
      text-decoration: none;
      font-size: 13px;

      transition: 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .howto-link:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.14);
    }

    input {
      width: 100%;
      padding: 14px 16px;
      margin-top: 14px;

      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.12);

      background: rgba(255,255,255,0.06);
      color:white;

      outline: none;
      font-size: 14px;

      backdrop-filter: blur(10px);
      transition: 0.2s ease;
    }

    input:focus {
      border-color: rgba(0,255,170,0.6);
      box-shadow: 0 0 0 3px rgba(0,255,170,0.15);
    }
    
    input::placeholder {
    color: white;
    opacity: 1;
    }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 14px;

      border: none;
      border-radius: 16px;

      background: linear-gradient(135deg, rgba(0,255,170,0.9), rgba(0,180,255,0.8));
      color: white;

      font-weight: 700;
      font-size: 15px;

      cursor: pointer;
      transition: 0.2s ease;

      box-shadow: 0 10px 30px rgba(0,255,170,0.2);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(0,255,170,0.3);
    }

    button:active {
      transform: scale(0.98);
    }

    #output {
      margin-top: 18px;
      padding: 12px;

      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);

      font-size: 13px;
      word-break: break-all;
    }

    #output a {
      color: rgba(120,255,200,0.95);
      text-decoration: none;
    }

    #output a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }
  </style>
</head>

<body>
  <div class="bg-glow"></div>

  <div class="container">
    <img
      src="https://yoylecookie.github.io/yoylecookie/Rofund-logos-full-2.png"
      class="logo"
      alt="Rofund"
    >

    <div class="subtitle">
      Welcome to RoFund — enter a donation code
      <br>
      <a href="howto.html" class="howto-link">How to use</a>
    </div>

    <input id="placeid" placeholder="Enter donation code">

    <button onclick="donate()">OPEN STAND</button>

    <div id="output"></div>

    <div class="footer">
      Made by Onion
    </div>
  </div>

  <script>
    function donate() {
      const donation = document.getElementById("placeid").value.trim();

      const url = "https://www.roblox.com/games/" + encodeURIComponent(donation);

      document.getElementById("output").innerHTML = `
        <a href="${url}" target="_blank">${url}</a>
      `;
    }
  </script>
</body>
</html>
